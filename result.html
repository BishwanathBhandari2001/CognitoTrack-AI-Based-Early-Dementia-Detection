<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            background: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 25px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: white;
            background: #007BFF;
            padding: 10px 20px;
            border-radius: 5px;
        }

        a:hover {
            background: #0056b3;
        }
    </style>
</head>

<body style="background:#111;color:rgb(46, 23, 58);text-align:center;margin-top:100px;font-family:Arial"></body>

    <div class="box">
        <h1>{{ result }}</h1>

        <h3>📊 Model Confidence</h3>
        <p>🟢 Control Probability: {{ probs[0] }}</p>
        <p>🔴 Dementia Probability: {{ probs[1] }}</p>

        <a href="/">🔁 Test Another Patient</a>
    </div>

</body>
</html>
